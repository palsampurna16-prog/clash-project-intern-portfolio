<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Ops Core | Sampurna Pal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="arena-screen">
      <div class="arena-board">
        <div class="arena-frame"></div>
        <div class="arena-lane arena-lane-top"></div>
        <div class="arena-lane arena-lane-bottom"></div>
        <div class="arena-river"></div>
        <div class="tower tower-top">Live Ops Core</div>
        <div class="tower tower-bottom">Project Management Intern</div>
        <div class="crown crown-left"></div>
        <div class="crown crown-right"></div>

        <section class="hero-copy">
          <p class="hero-kicker">One Arena. One Deck. One Role.</p>
          <h1>Live Ops Core</h1>
          <p class="hero-subtitle">
            How I keep systems running smoothly in a live environment
          </p>
        </section>

        <section class="deck-stage" aria-label="Interactive work cards">
          <p class="deck-hint">Click a card to see how I operate</p>

          <div class="deck-strip"></div>

          <div class="card-grid">
            <button class="showcase-card active" type="button" aria-expanded="true">
              <span class="card-inner">
                <span class="card-face card-front">
                  <span class="card-index">1</span>
                  <span class="card-title">Track Workstreams</span>
                </span>
                <span class="card-face card-back">
                  <span class="card-title">Track Workstreams</span>
                  <span class="card-copy"
                    >Coordinated 5+ concurrent workstreams with clear ownership and
                    progress tracking, ensuring timely delivery.</span
                  >
                </span>
              </span>
            </button>

            <button class="showcase-card" type="button" aria-expanded="false">
              <span class="card-inner">
                <span class="card-face card-front">
                  <span class="card-index">2</span>
                  <span class="card-title">Coordinate Teams</span>
                </span>
                <span class="card-face card-back">
                  <span class="card-title">Coordinate Teams</span>
                  <span class="card-copy"
                    >Worked across product, operations, technical, and external teams
                    to maintain alignment and communication.</span
                  >
                </span>
              </span>
            </button>

            <button class="showcase-card" type="button" aria-expanded="false">
              <span class="card-inner">
                <span class="card-face card-front">
                  <span class="card-index">3</span>
                  <span class="card-title">Maintain Dashboards</span>
                </span>
                <span class="card-face card-back">
                  <span class="card-title">Maintain Dashboards</span>
                  <span class="card-copy"
                    >Built and maintained KPI dashboards and reports to support
                    visibility and decision-making.</span
                  >
                </span>
              </span>
            </button>

            <button class="showcase-card" type="button" aria-expanded="false">
              <span class="card-inner">
                <span class="card-face card-front">
                  <span class="card-index">4</span>
                  <span class="card-title">Resolve Blockers</span>
                </span>
                <span class="card-face card-back">
                  <span class="card-title">Resolve Blockers</span>
                  <span class="card-copy"
                    >Identified risks and dependencies early and followed up to ensure
                    work continued without delays.</span
                  >
                </span>
              </span>
            </button>

            <button class="showcase-card" type="button" aria-expanded="false">
              <span class="card-inner">
                <span class="card-face card-front">
                  <span class="card-index">5</span>
                  <span class="card-title">Improve Workflows</span>
                </span>
                <span class="card-face card-back">
                  <span class="card-title">Improve Workflows</span>
                  <span class="card-copy"
                    >Standardized documentation and suggested process improvements
                    adopted by the team.</span
                  >
                </span>
              </span>
            </button>
          </div>
        </section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
